info:
  name: register
  type: http
  seq: 1

http:
  method: POST
  url: "{{base-url}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "{{registerEmail}}",
        "password": "Password123!",
        "confirmPassword": "Password123!"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const timestamp = Date.now();
        const random = Math.floor(Math.random() * 10000);

        bru.setVar('registerEmail', `test${timestamp}${random}@example.com`);
    - type: tests
      code: |-
        const data = res.getBody();

        test("Should register a new user", () => {
          expect(res.getStatus()).to.equal(201);

          expect(data.id).to.exist;
          expect(data.email).to.exist;
          expect(data.isActive).to.be.true;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
