info:
  name: register
  type: http
  seq: 1

http:
  method: POST
  url: "{{base-url}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "nitro@example.com",
        "username": "nitro",
        "password": "Password1234!",
        "confirmPassword": "Password1234!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
