info:
  name: get-by-slug
  type: http
  seq: 1

http:
  method: GET
  url: "{{base-url}}/user-profiles/alice"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const data = res.getBody();

        test("Should user-profile successfully", () => {
          expect(res.getStatus()).to.equal(200);
        });

        test("Should return user profile", () => {
          expect(data.id).to.be.a("string");
          expect(data.slug).to.equal('alice');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
