opencollection: 1.0.0

info:
  name: Virtual Racing Manager
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        password: ''
      bypassProxy: ''

request:
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
