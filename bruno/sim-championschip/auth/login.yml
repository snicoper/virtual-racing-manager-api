info:
  name: login
  type: http
  seq: 2

http:
  method: POST
  url: "{{base-url}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "salva@example.com",
        "password": "Password123!"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        bru.setEnvVar('accessToken', data.accessToken)
    - type: tests
      code: |-
        const data = res.getBody();

        test("Access token should exist", () => {
          expect(data.accessToken).to.exist;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
